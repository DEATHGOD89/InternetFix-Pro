<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Test Dashboard</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(15, 15, 20, 0.7);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent-cyan: #00f2ff;
            --accent-magenta: #ff00ea;
            --glow-cyan: 0 0 15px rgba(0, 242, 255, 0.5);
            --glow-magenta: 0 0 15px rgba(255, 0, 234, 0.5);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f0f0f5;
                --card-bg: rgba(255, 255, 255, 0.8);
                --text-main: #1a1a1a;
                --text-dim: #666666;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .dashboard {
            width: 90%;
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 24px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 26px;
            z-index: -1;
            opacity: 0.2;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gauge-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 2rem;
        }

        .gauge-svg {
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .gauge-progress {
            fill: none;
            stroke: var(--accent-cyan);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 628; /* 2 * PI * 100 */
            stroke-dashoffset: 628;
            transition: stroke-dashoffset 0.5s ease;
            filter: drop-shadow(var(--glow-cyan));
        }

        .gauge-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .speed-number {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .speed-unit {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .verdict {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            min-height: 1.5em;
            color: var(--accent-cyan);
        }

        .btn-start {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 1rem 3rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: var(--glow-cyan);
        }

        .btn-start:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.8);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .disclaimer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .testing {
            animation: pulse 1.5s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Network Pulse</h1>
        
        <div class="gauge-container">
            <svg class="gauge-svg" width="240" height="240" viewBox="0 0 220 220">
                <circle class="gauge-bg" cx="110" cy="110" r="100"></circle>
                <circle id="progressCircle" class="gauge-progress" cx="110" cy="110" r="100"></circle>
            </svg>
            <div class="gauge-value">
                <div id="mainSpeed" class="speed-number">0</div>
                <div class="speed-unit">Mbps</div>
            </div>
        </div>

        <div id="verdictText" class="verdict">Ready to test</div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">Ping</div>
                <div id="pingValue" class="metric-value">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Jitter</div>
                <div id="jitterValue" class="metric-value">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Download</div>
                <div id="downloadValue" class="metric-value">-</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Upload</div>
                <div id="uploadValue" class="metric-value">-</div>
            </div>
        </div>

        <button id="startBtn" class="btn-start">Start Test</button>

        <p class="disclaimer">
            Results reflect in-browser transfer speed, not your ISP speed.<br>
            Tests are performed using local memory and dummy requests.
        </p>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const mainSpeed = document.getElementById('mainSpeed');
        const progressCircle = document.getElementById('progressCircle');
        const verdictText = document.getElementById('verdictText');
        const pingEl = document.getElementById('pingValue');
        const jitterEl = document.getElementById('jitterValue');
        const downloadEl = document.getElementById('downloadValue');
        const uploadEl = document.getElementById('uploadValue');

        const CIRCUMFERENCE = 2 * Math.PI * 100;
        const TEST_DURATION = 5000; // 5 seconds per test

        function updateGauge(value, max = 1000) {
            const percent = Math.min(value / max, 1);
            const offset = CIRCUMFERENCE - (percent * CIRCUMFERENCE);
            progressCircle.style.strokeDashoffset = offset;
            mainSpeed.textContent = value.toFixed(value < 10 ? 1 : 0);
        }

        function setVerdict(mbps) {
            if (mbps < 25) verdictText.textContent = "Basic browsing & SD video";
            else if (mbps < 100) verdictText.textContent = "Good for HD streaming & video calls";
            else if (mbps < 500) verdictText.textContent = "Fast — handles multiple 4K streams";
            else verdictText.textContent = "Excellent — fiber-tier speed";
        }

        async function runPingTest() {
            const times = [];
            for (let i = 0; i < 10; i++) { // More samples for better accuracy
                const start = performance.now();
                try {
                    await fetch(`${window.location.href}?_ping=${Date.now()}`, { 
                        method: 'HEAD', 
                        cache: 'no-store',
                        mode: 'no-cors'
                    });
                    times.push(performance.now() - start);
                } catch (e) {
                    times.push(performance.now() - start);
                }
                // Small delay between pings
                await new Promise(r => setTimeout(r, 50));
            }

            const sorted = [...times].sort((a, b) => a - b);
            const middleSamples = sorted.slice(2, -2); // Drop 2 fastest, 2 slowest
            const avgPing = middleSamples.reduce((a, b) => a + b, 0) / middleSamples.length;

            const mean = times.reduce((a, b) => a + b, 0) / times.length;
            const jitter = Math.sqrt(times.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / times.length);

            return { ping: avgPing, jitter: jitter };
        }

        async function runDownloadTest() {
            let totalBytes = 0;
            const startTime = performance.now();
            let lastUpdate = startTime;
            const downloadUrl = '/speedtest/25mb.bin'; // Use the actual server asset
            
            // Fallback to fetching current page if asset is missing
            const fallbackUrl = `${window.location.href}?_dl=${Date.now()}`;
            let activeUrl = downloadUrl;

            // Check if 25mb.bin exists, else use fallback
            try {
                const check = await fetch(downloadUrl, { method: 'HEAD' });
                if (!check.ok) activeUrl = fallbackUrl;
            } catch (e) {
                activeUrl = fallbackUrl;
            }

            while (performance.now() - startTime < TEST_DURATION) {
                const response = await fetch(`${activeUrl}&t=${Date.now()}`, { cache: 'no-store' });
                const reader = response.body.getReader();
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    totalBytes += value.length;
                    const now = performance.now();
                    
                    if (now - lastUpdate > 100) { // Update UI every 100ms
                        const elapsed = (now - startTime) / 1000;
                        const currentMbps = (totalBytes * 8) / elapsed / 1_000_000;
                        updateGauge(currentMbps, 1000);
                        lastUpdate = now;
                    }

                    if (now - startTime >= TEST_DURATION) {
                        reader.cancel();
                        break;
                    }
                }
            }

            const finalElapsed = (performance.now() - startTime) / 1000;
            return (totalBytes * 8) / finalElapsed / 1_000_000;
        }

        async function runUploadTest() {
            let totalBytes = 0;
            const startTime = performance.now();
            let lastUpdate = startTime;
            const chunkSize = 512 * 1024; // 512KB chunks for steady upload
            const data = new Uint8Array(chunkSize);
            crypto.getRandomValues(data);

            while (performance.now() - startTime < TEST_DURATION) {
                try {
                    await fetch(`${window.location.href}?_upload=${Date.now()}`, {
                        method: 'POST',
                        body: data,
                        cache: 'no-store',
                        mode: 'no-cors'
                    });
                    totalBytes += chunkSize;
                    
                    const now = performance.now();
                    if (now - lastUpdate > 100) {
                        const elapsed = (now - startTime) / 1000;
                        const currentMbps = (totalBytes * 8) / elapsed / 1_000_000;
                        updateGauge(currentMbps, 500); // Usually upload is slower
                        lastUpdate = now;
                    }
                } catch (e) {
                    // Even if it 404s, the data was sent
                    totalBytes += chunkSize;
                }
            }

            const finalElapsed = (performance.now() - startTime) / 1000;
            return (totalBytes * 8) / finalElapsed / 1_000_000;
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.classList.add('testing');
            startBtn.textContent = "Testing...";
            
            // Reset UI
            pingEl.textContent = "-";
            jitterEl.textContent = "-";
            downloadEl.textContent = "-";
            uploadEl.textContent = "-";
            updateGauge(0);

            // 1. Ping
            verdictText.textContent = "Checking Latency...";
            const { ping, jitter } = await runPingTest();
            pingEl.textContent = `${ping.toFixed(1)} ms`;
            jitterEl.textContent = `${jitter.toFixed(1)} ms`;

            // 2. Download
            verdictText.textContent = "Measuring Download...";
            const dlSpeed = await runDownloadTest();
            downloadEl.textContent = `${dlSpeed.toFixed(1)} Mbps`;
            updateGauge(dlSpeed, 1000);
            setVerdict(dlSpeed);

            // 3. Upload
            verdictText.textContent = "Measuring Upload...";
            const ulSpeed = await runUploadTest();
            uploadEl.textContent = `${ulSpeed.toFixed(1)} Mbps`;
            updateGauge(ulSpeed, 500);

            // Done
            verdictText.textContent = "Test Complete";
            startBtn.disabled = false;
            startBtn.classList.remove('testing');
            startBtn.textContent = "Run Again";
        });
    </script>

</body>
</html>
